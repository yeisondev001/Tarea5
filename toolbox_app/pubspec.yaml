name: toolbox_app
description: "Aplicacion de herramientas - Tarea 6"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  url_launcher: ^6.3.1
  audioplayers: ^6.1.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    background_color: "#121414"
    theme_color: "#FFE285"
  image_path: "assets/images/yeison.jpg"
  remove_alpha_ios: true
  adaptive_icon_background: "#121414"
  adaptive_icon_foreground: "assets/images/yeison.jpg"

